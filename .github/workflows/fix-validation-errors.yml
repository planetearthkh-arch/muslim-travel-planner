name: Fix validation errors

on:
  push:
    branches: [fix-all-release-blockers]
    paths:
      - scripts/fix-validation-errors.mjs

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-all-release-blockers
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply fixes and validate
        id: validation
        shell: bash
        run: |
          set +e
          {
            node scripts/fix-validation-errors.mjs || exit $?
            npm ci || exit $?
            npm run typecheck || exit $?
            npm test || exit $?
            npm run lint || exit $?
            npm run build || exit $?
          } 2>&1 | tee validation-run.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit fixes or diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          if [ "${{ steps.validation.outputs.status }}" = "0" ]; then
            git commit -m "Fix hardening validation errors"
          else
            git commit -m "Record hardening validation diagnostics"
          fi
          git push origin HEAD:fix-all-release-blockers
      - name: Fail when validation failed
        if: steps.validation.outputs.status != '0'
        run: exit 1
