name: Set iOS Build 115 Once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/set-ios-build-115-once.yml

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set iOS build number to 115
        run: |
          sed -E -i 's/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = 115;/g' ios/App/App.xcodeproj/project.pbxproj
          test "$(grep -c 'CURRENT_PROJECT_VERSION = 115;' ios/App/App.xcodeproj/project.pbxproj)" -eq 2

      - name: Commit build number
        run: |
          rm .github/workflows/set-ios-build-115-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios/App/App.xcodeproj/project.pbxproj .github/workflows/set-ios-build-115-once.yml
          git commit -m "Set iOS build number to 115"
          git push origin HEAD:main
