name: Temporary iOS Build 153 Prep

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write

jobs:
  prepare:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: macos-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: release/ios-build-153-safarmate
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set iOS version 1.0.0 build 153
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          project_path = Path('ios/App/App.xcodeproj/project.pbxproj')
          project = project_path.read_text(encoding='utf-8')
          project, count = re.subn(r'CURRENT_PROJECT_VERSION = \d+;', 'CURRENT_PROJECT_VERSION = 153;', project)
          if count < 2:
              raise SystemExit(f'Expected at least two iOS build-number settings, found {count}.')
          project = re.sub(r'MARKETING_VERSION = [^;]+;', 'MARKETING_VERSION = 1.0.0;', project)
          project_path.write_text(project, encoding='utf-8')

          verifier_path = Path('scripts/verify-ios-version.mjs')
          verifier = verifier_path.read_text(encoding='utf-8')
          verifier = re.sub(r'version < \d+', 'version < 153', verifier)
          verifier = re.sub(r'must be at least \d+', 'must be at least 153', verifier)
          verifier_path.write_text(verifier, encoding='utf-8')

          release_doc = '''# SafarMate iOS Release\n\n- Marketing version: **1.0.0**\n- Build number: **153**\n- App Store name: **SafarMate: Muslim Travel**\n- Subtitle: **Prayer, Qibla & Halal Guide**\n\n## What's New\n\nSafarOne is now SafarMate. This update introduces the new SafarMate identity across the app while preserving saved trips and existing app data. It also includes reliability and localization improvements for Muslim travel planning, prayer tools, Qibla, halal discovery, and trip sharing.\n\n## Upload note\n\nUse the existing bundle identifier `com.planetearthkids.muslimtravelplanner`. Upload build 153 as an update to the existing App Store Connect record.\n'''
          Path('docs/APP_STORE_RELEASE_1.0.0_BUILD_153.md').write_text(release_doc, encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Verify build number
        run: npm run ios:version-verify

      - name: Run tests and native build
        run: |
          npm run typecheck
          npm test
          npm run build:native

      - name: Verify iOS build and archive
        run: |
          npm run ios:verify
          npm run ios:archive-verify

      - name: Commit release preparation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios/App/App.xcodeproj/project.pbxproj scripts/verify-ios-version.mjs docs/APP_STORE_RELEASE_1.0.0_BUILD_153.md
          git commit -m "Prepare SafarMate iOS build 153"
          git push origin HEAD:release/ios-build-153-safarmate
