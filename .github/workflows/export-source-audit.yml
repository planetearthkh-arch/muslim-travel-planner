name: Export Source Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-source-audit.yml'
      - 'src/**'
      - 'public/**'
      - 'ios/**'
      - 'android/**'
      - 'scripts/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'vite*.ts'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source bundle
        shell: bash
        run: git ls-files -z | tar --null -T - -czf source-audit-bundle.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: source-audit-bundle
          path: source-audit-bundle.tar.gz
          if-no-files-found: error
          retention-days: 3
