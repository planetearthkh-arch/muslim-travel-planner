name: Build prayer search reliability patch

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reliability patch
        run: python3 scripts/apply-prayer-search-reliability.py

      - name: Install dependencies
        run: npm ci

      - name: Validate patch
        run: |
          npm run typecheck
          npm test
          npm run lint
          npm run build

      - name: Upload validated files
        uses: actions/upload-artifact@v4
        with:
          name: prayer-search-reliability-files
          path: |
            src/main.ts
            src/prayer-spaces.ts
            src/prayer-spaces-global.test.ts
