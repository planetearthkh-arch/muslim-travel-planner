name: Capture Clean Map Test Failure Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/capture-clean-map-test-failure-once.yml
      - src/map-label-policy.test.ts
      - src/map-rtl-bootstrap.ts
      - src/app-bootstrap.ts

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/clean-map-label-restoration
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture concise test failures
        run: |
          npm test > /tmp/test-output.txt 2>&1 || true
          grep -nE 'not ok|failureType|error:|location:|Expected values|actual:|expected:|stack:' /tmp/test-output.txt > clean-map-test-failures.txt || true
          tail -n 40 /tmp/test-output.txt >> clean-map-test-failures.txt
      - name: Commit report and remove workflow
        run: |
          rm .github/workflows/capture-clean-map-test-failure-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clean-map-test-failures.txt .github/workflows/capture-clean-map-test-failure-once.yml
          git commit -m "Record clean map test failures"
          git push origin HEAD:codex/clean-map-label-restoration
