name: Finish Professional Audit Fixes Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/finish-professional-audit-fixes-once.yml'

permissions:
  contents: write

jobs:
  finish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-all-audit-findings
          fetch-depth: 0

      - name: Update cache-version and Qibla regression assertions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for name in [
              'src/app-hardening.test.ts',
              'src/halal-page-bootstrap.test.ts',
              'src/qibla-copy-bootstrap.test.ts',
              'src/release-hardening.test.ts',
          ]:
              path = Path(name)
              text = path.read_text()
              text = text.replace('mtp-app-shell-v16', 'mtp-app-shell-v17')
              path.write_text(text)

          qibla = Path('src/qibla-copy-bootstrap.test.ts')
          text = qibla.read_text().replace(
              "fr: { liveCompass: 'Démarrer la boussole en direct', fixedBearing: 'Fixed bearing' }",
              "fr: { liveCompass: 'Démarrer la boussole en direct', fixedBearing: 'Direction fixe' }",
          )
          qibla.write_text(text)

          setup = Path('scripts/setup-android.mjs')
          text = setup.read_text()
          marker = "cpSync(join(templateDir, 'java'), javaTarget, { recursive: true });\n"
          addition = marker + "cpSync(join(templateDir, 'res'), join(mainDir, 'res'), { recursive: true });\n"
          if "cpSync(join(templateDir, 'res'), join(mainDir, 'res'), { recursive: true });" not in text:
              if marker not in text:
                  raise SystemExit('Android Java-copy marker not found')
              text = text.replace(marker, addition, 1)
          setup.write_text(text)
          PY

      - name: Add localized Android app-name resources
        shell: bash
        run: |
          for folder in values values-ar values-in values-ms values-tr values-fr values-ur; do
            mkdir -p "mobile/android/res/$folder"
            cat > "mobile/android/res/$folder/strings.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SafarOne</string>
              <string name="title_activity_main">SafarOne</string>
          </resources>
          XML
          done

      - name: Add localization regression tests
        shell: bash
        run: |
          cat > src/localization-quality.test.ts <<'TS'
          import assert from 'node:assert/strict';
          import test from 'node:test';
          import { labels, languages, languageDirection, localeForLanguage } from './app-language.js';
          import './turkish-halal-copy.js';

          const expectedIdentity = {
            en: ['SafarOne', 'Muslim Travel Planner'],
            ar: ['SafarOne', 'مخطط سفر للمسلمين'],
            id: ['SafarOne', 'Perencana Perjalanan Muslim'],
            ms: ['SafarOne', 'Perancang Perjalanan Muslim'],
            tr: ['SafarOne', 'Müslüman Seyahat Planlayıcısı'],
            fr: ['SafarOne', 'Planificateur de voyage musulman'],
            ur: ['SafarOne', 'مسلمان سفری منصوبہ ساز'],
          } as const;

          test('all supported languages have the same complete label key set and correct identity', () => {
            const englishKeys = Object.keys(labels.en).sort();
            assert.deepEqual(languages.map((item) => item.code), ['en', 'ar', 'id', 'ms', 'tr', 'fr', 'ur']);
            for (const { code } of languages) {
              assert.deepEqual(Object.keys(labels[code]).sort(), englishKeys);
              assert.equal(labels[code].title, expectedIdentity[code][0]);
              assert.equal(labels[code].subtitle, expectedIdentity[code][1]);
              for (const [key, value] of Object.entries(labels[code])) {
                if (key === 'prototype') continue;
                assert.equal(value.trim().length > 0, true);
              }
            }
            assert.equal(languageDirection('ar'), 'rtl');
            assert.equal(languageDirection('ur'), 'rtl');
            assert.equal(localeForLanguage('ms'), 'ms-MY');
            assert.equal(localeForLanguage('ur'), 'ur-PK');
          });

          test('Indonesian and Malay halal labels are translated naturally', () => {
            assert.equal(labels.id.halalOnly, 'Hanya halal');
            assert.equal(labels.id.halalOptions, 'Pilihan halal');
            assert.equal(labels.ms.halalOnly, 'Halal sahaja');
            assert.equal(labels.ms.halalOptions, 'Pilihan halal');
            assert.equal(labels.ms.prayerWheelchair, 'Akses kerusi roda');
          });

          test('Malay release copy contains no known Indonesian placeholder vocabulary', () => {
            const banned = /\b(kota|izin|layanan|pencarian|ditemukan|menampilkan|tampaknya|mobil|resmi|tercantum|persyaratan|pengemudi|asuransi|kebijakan|kehabisan waktu|perbesar|urutkan|marker|terkonfirmasi|filter|kecocokan|lisensi|gambar|riwayat|favorit|kapasitas|visibilitas|zona)\b/i;
            for (const value of Object.values(labels.ms)) assert.equal(banned.test(value), false);
          });

          test('Turkish runtime corrections replace generated placeholder travel-tool copy', () => {
            const copy = labels.tr;
            for (const key of Object.keys(copy).filter((key) => /^(carRental|publicTransport|taxi|attractions|toilets)/.test(key))) {
              assert.equal(/\b(öğe|alt başlık)\b/i.test(copy[key]), false);
            }
            assert.equal(copy.carRentalTitle, 'Araç Kiralama');
            assert.equal(copy.publicTransportTitle, 'Toplu Taşıma');
            assert.equal(copy.taxiTitle, 'Taksi Hizmetleri');
            assert.equal(copy.attractionsTitle, 'Gezilecek Yerler');
            assert.equal(copy.toiletsTitle, 'Umumi Tuvaletler');
          });

          test('Apple Maps remains a product name rather than an untranslated UI defect', () => {
            assert.equal(labels.en.prayerAppleMaps, 'Apple Maps');
            assert.equal(labels.id.prayerAppleMaps, 'Apple Maps');
            assert.equal(labels.ms.prayerAppleMaps, 'Apple Maps');
            assert.equal(labels.tr.prayerAppleMaps, 'Apple Maps');
            assert.equal(labels.ur.prayerAppleMaps, 'Apple Maps');
          });
          TS

          cat > src/place-report-i18n.test.ts <<'TS'
          import assert from 'node:assert/strict';
          import test from 'node:test';
          import { buildReportText, createPlaceReport, githubIssueUrl } from './place-report.js';

          const place = { feature: 'Halal Restaurants', name: 'Central Grill', city: 'London', country: 'United Kingdom' };

          test('place-report exports and GitHub titles follow the selected language', () => {
            const cases = [
              ['en', 'SafarOne place report', 'Place report:'],
              ['ar', 'تقرير مكان من SafarOne', 'تقرير مكان:'],
              ['id', 'Laporan tempat SafarOne', 'Laporan tempat:'],
              ['ms', 'Laporan tempat SafarOne', 'Laporan tempat:'],
              ['tr', 'SafarOne yer bildirimi', 'Yer bildirimi:'],
              ['fr', 'Signalement de lieu SafarOne', 'Signalement de lieu:'],
              ['ur', 'SafarOne مقام رپورٹ', 'مقام رپورٹ:'],
            ] as const;
            for (const [language, heading, titlePrefix] of cases) {
              const report = createPlaceReport(place, 'halal', 'note', language, '2026-07-05T12:00:00.000Z');
              const text = buildReportText(report);
              assert.equal(text.startsWith(heading), true);
              assert.equal(text.includes('halal\n'), false);
              const title = new URL(githubIssueUrl(report)).searchParams.get('title') ?? '';
              assert.equal(title.startsWith(titlePrefix), true);
            }
          });
          TS

          cat > src/android-localization.test.ts <<'TS'
          import assert from 'node:assert/strict';
          import test from 'node:test';

          async function repoFile(path: string) {
            const load = new Function('specifier', 'return import(specifier)') as (specifier: string) => Promise<{ readFile: (path: URL, encoding: string) => Promise<string> }>;
            return load('node:fs/promises').then((fs) => fs.readFile(new URL(`../${path}`, import.meta.url), 'utf8'));
          }

          test('Android templates preserve SafarOne identity in every supported locale', async () => {
            for (const folder of ['values', 'values-ar', 'values-in', 'values-ms', 'values-tr', 'values-fr', 'values-ur']) {
              const source = await repoFile(`mobile/android/res/${folder}/strings.xml`);
              assert.equal(source.includes('<string name="app_name">SafarOne</string>'), true);
              assert.equal(source.includes('<string name="title_activity_main">SafarOne</string>'), true);
            }
            const manifest = await repoFile('mobile/android/AndroidManifest.xml');
            const setup = await repoFile('scripts/setup-android.mjs');
            assert.equal(manifest.includes('android:supportsRtl="true"'), true);
            assert.equal(setup.includes("cpSync(join(templateDir, 'res'), join(mainDir, 'res'), { recursive: true })"), true);
          });
          TS

      - name: Add HTML-safety and identity regression tests
        shell: bash
        run: |
          cat > src/html-safety.test.ts <<'TS'
          import assert from 'node:assert/strict';
          import test from 'node:test';

          async function repoFile(path: string) {
            const load = new Function('specifier', 'return import(specifier)') as (specifier: string) => Promise<{ readFile: (path: URL, encoding: string) => Promise<string> }>;
            return load('node:fs/promises').then((fs) => fs.readFile(new URL(`../${path}`, import.meta.url), 'utf8'));
          }

          test('external currency data is rendered through text nodes or escaped markup', async () => {
            const source = await repoFile('src/main.ts');
            assert.equal(source.includes('new Option(currencyOptionText(currency), currency.code)'), true);
            assert.equal(source.includes('select.replaceChildren(...options.map'), true);
            assert.equal(source.includes('currencySelectOptions()'), false);
            assert.equal(source.includes('esc(`${from.flag} ${from.code} ${from.name[lang]} · ${from.symbol}`)'), true);
            assert.equal(source.includes('esc(`${to.flag} ${to.code} ${to.name[lang]} · ${to.symbol}`)'), true);
          });

          test('map fallback and currency picker dynamic copy avoid HTML interpolation', async () => {
            const main = await repoFile('src/main.ts');
            const picker = await repoFile('src/money-currency-picker-bootstrap.ts');
            assert.equal(main.includes('element.replaceChildren(paragraph)'), true);
            assert.equal(picker.includes("close.setAttribute('aria-label', copy.close)"), true);
            assert.equal(picker.includes('searchCopy.textContent = copy.search'), true);
            assert.equal(picker.includes('empty.textContent = copy.noResults'), true);
            assert.equal(picker.includes('aria-label="${copy.close}"'), false);
          });
          TS

          cat > src/app-identity.test.ts <<'TS'
          import assert from 'node:assert/strict';
          import test from 'node:test';

          async function repoFile(path: string) {
            const load = new Function('specifier', 'return import(specifier)') as (specifier: string) => Promise<{ readFile: (path: URL, encoding: string) => Promise<string> }>;
            return load('node:fs/promises').then((fs) => fs.readFile(new URL(`../${path}`, import.meta.url), 'utf8'));
          }

          test('user-facing app identity stays SafarOne — Muslim Travel Planner', async () => {
            const html = await repoFile('index.html');
            const manifest = await repoFile('public/manifest.webmanifest');
            const plist = await repoFile('ios/App/App/Info.plist');
            assert.equal(html.includes('SafarOne — Muslim Travel Planner'), true);
            assert.equal(manifest.includes('SafarOne'), true);
            assert.equal(plist.includes('SafarOne'), true);
            for (const source of [html, manifest, plist]) assert.equal(source.includes('Muslim Trip Planner'), false);
          });
          TS

      - name: Commit final transparent audit fixes
        shell: bash
        run: |
          rm .github/workflows/finish-professional-audit-fixes-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/setup-android.mjs src/*.test.ts .github/workflows/finish-professional-audit-fixes-once.yml
          git add -f mobile/android/res
          git commit -m 'Add multilingual native resources and regression coverage'
          git push origin HEAD:codex/fix-all-audit-findings
