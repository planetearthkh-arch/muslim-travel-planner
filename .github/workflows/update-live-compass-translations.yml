name: Update Live Compass Translations

on:
  pull_request:

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'french-language-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: french-language-v2
      - name: Update shared Qibla button translations
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/i18n.ts')
          text = path.read_text()
          replacements = {
              "qiblaRequestMotion: 'Enable compass'": "qiblaRequestMotion: 'Start live compass'",
              "qiblaRequestMotion: 'تفعيل البوصلة'": "qiblaRequestMotion: 'ابدأ البوصلة المباشرة'",
              "qiblaRequestMotion: 'Aktifkan kompas'": "qiblaRequestMotion: 'Mulai kompas langsung'",
              "qiblaRequestMotion: 'Pusulayı etkinleştir'": "qiblaRequestMotion: 'Canlı pusulayı başlat'",
          }
          for old, new in replacements.items():
              if new in text:
                  continue
              if old not in text:
                  raise SystemExit(f'Missing expected translation: {old}')
              text = text.replace(old, new, 1)
          # The Malay text has the same old wording as Indonesian, so update the second remaining occurrence.
          old_ms = "qiblaRequestMotion: 'Aktifkan kompas'"
          new_ms = "qiblaRequestMotion: 'Mulakan kompas langsung'"
          if new_ms not in text:
              if old_ms not in text:
                  raise SystemExit('Missing Malay compass translation')
              text = text.replace(old_ms, new_ms, 1)
          path.write_text(text)
          PY
      - name: Remove temporary workflow and commit
        run: |
          git rm .github/workflows/update-live-compass-translations.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/i18n.ts src/qibla-i18n.test.ts
          git commit -m "Synchronize live compass translations"
          git push origin HEAD:french-language-v2
