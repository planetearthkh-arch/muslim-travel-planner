name: Summarize test log

on:
  push:
    branches: [codex/fix-deep-audit-issues]

permissions:
  contents: write

jobs:
  summarize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-deep-audit-issues
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/summarize-test-log.mjs
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add failure-summary.txt
          git commit -m "Summarize test failures" || true
          git push origin HEAD:codex/fix-deep-audit-issues
