name: Apply French Final Wiring

on:
  push:
    branches: [add-french-language]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-french-language
      - name: Update language test and Xcode resources
        run: |
          python - <<'PY'
          from pathlib import Path

          planner = Path('src/planner.test.ts')
          text = planner.read_text()
          old = """test('supports switching among English, Arabic, Bahasa Indonesia, Bahasa Melayu, and Turkish', () => {
  assert.deepEqual(languages.map((language) => language.code), ['en', 'ar', 'id', 'ms', 'tr']);
  assert.equal(languages.find((language) => language.code === 'ms')?.label, 'Bahasa Melayu');
  assert.equal(languages.find((language) => language.code === 'tr')?.label, 'Türkçe');
  assert.equal(nextLanguage('en'), 'ar');
  assert.equal(nextLanguage('ar'), 'id');
  assert.equal(nextLanguage('id'), 'ms');
  assert.equal(nextLanguage('ms'), 'tr');
  assert.equal(nextLanguage('tr'), 'en');
  assert.equal(languageDirection('en'), 'ltr');
  assert.equal(languageDirection('id'), 'ltr');
  assert.equal(languageDirection('ms'), 'ltr');
  assert.equal(languageDirection('tr'), 'ltr');
  assert.equal(languageDirection('ar'), 'rtl');
});"""
          new = """test('supports switching among English, Arabic, Bahasa Indonesia, Bahasa Melayu, Turkish, and French', () => {
  assert.deepEqual(languages.map((language) => language.code), ['en', 'ar', 'id', 'ms', 'tr', 'fr']);
  assert.equal(languages.find((language) => language.code === 'ms')?.label, 'Bahasa Melayu');
  assert.equal(languages.find((language) => language.code === 'tr')?.label, 'Türkçe');
  assert.equal(languages.find((language) => language.code === 'fr')?.label, 'Français');
  assert.equal(nextLanguage('en'), 'ar');
  assert.equal(nextLanguage('ar'), 'id');
  assert.equal(nextLanguage('id'), 'ms');
  assert.equal(nextLanguage('ms'), 'tr');
  assert.equal(nextLanguage('tr'), 'fr');
  assert.equal(nextLanguage('fr'), 'en');
  assert.equal(languageDirection('en'), 'ltr');
  assert.equal(languageDirection('id'), 'ltr');
  assert.equal(languageDirection('ms'), 'ltr');
  assert.equal(languageDirection('tr'), 'ltr');
  assert.equal(languageDirection('fr'), 'ltr');
  assert.equal(languageDirection('ar'), 'rtl');
});"""
          if old in text:
              planner.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('Language switching test block was not found')

          project = Path('ios/App/App.xcodeproj/project.pbxproj')
          pbx = project.read_text()

          replacements = [
            (
              '\t\tB00100062D2D000000000001 /* tr InfoPlist.strings in Resources */ = {isa = PBXBuildFile; fileRef = B00100142D2D000000000001 /* tr InfoPlist.strings */; };\n',
              '\t\tB00100062D2D000000000001 /* tr InfoPlist.strings in Resources */ = {isa = PBXBuildFile; fileRef = B00100142D2D000000000001 /* tr InfoPlist.strings */; };\n\t\tB00100072D2D000000000001 /* fr InfoPlist.strings in Resources */ = {isa = PBXBuildFile; fileRef = B00100152D2D000000000001 /* fr InfoPlist.strings */; };\n',
            ),
            (
              '\t\tB00100142D2D000000000001 /* tr InfoPlist.strings */ = {isa = PBXFileReference; lastKnownFileType = text.plist.strings; name = "tr InfoPlist.strings"; path = tr.lproj/InfoPlist.strings; sourceTree = "<group>"; };\n',
              '\t\tB00100142D2D000000000001 /* tr InfoPlist.strings */ = {isa = PBXFileReference; lastKnownFileType = text.plist.strings; name = "tr InfoPlist.strings"; path = tr.lproj/InfoPlist.strings; sourceTree = "<group>"; };\n\t\tB00100152D2D000000000001 /* fr InfoPlist.strings */ = {isa = PBXFileReference; lastKnownFileType = text.plist.strings; name = "fr InfoPlist.strings"; path = fr.lproj/InfoPlist.strings; sourceTree = "<group>"; };\n',
            ),
            (
              '\t\t\t\tB00100142D2D000000000001 /* tr InfoPlist.strings */,\n',
              '\t\t\t\tB00100142D2D000000000001 /* tr InfoPlist.strings */,\n\t\t\t\tB00100152D2D000000000001 /* fr InfoPlist.strings */,\n',
            ),
            (
              '\t\t\t\tid,\n\t\t\t\tms,\n\t\t\t\tBase,\n',
              '\t\t\t\tid,\n\t\t\t\tms,\n\t\t\t\ttr,\n\t\t\t\tfr,\n\t\t\t\tBase,\n',
            ),
            (
              '\t\t\t\tB00100062D2D000000000001 /* tr InfoPlist.strings in Resources */,\n',
              '\t\t\t\tB00100062D2D000000000001 /* tr InfoPlist.strings in Resources */,\n\t\t\t\tB00100072D2D000000000001 /* fr InfoPlist.strings in Resources */,\n',
            ),
          ]
          for old_text, new_text in replacements:
              if new_text in pbx:
                  continue
              if old_text not in pbx:
                  raise SystemExit(f'Expected Xcode project entry not found: {old_text.strip()}')
              pbx = pbx.replace(old_text, new_text, 1)
          project.write_text(pbx)
          PY
      - name: Commit final French wiring
        run: |
          if git diff --quiet; then
            echo "Final French wiring already applied."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/planner.test.ts ios/App/App.xcodeproj/project.pbxproj
          git commit -m "Complete French iOS wiring and tests"
          git push origin HEAD:add-french-language
