name: Debug French Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture test output
        run: npm test > test-output.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: french-test-output
          path: test-output.txt
