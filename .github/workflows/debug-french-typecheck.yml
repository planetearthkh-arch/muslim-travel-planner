name: Debug French Typecheck

on:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture typecheck output
        run: npm run typecheck > typecheck-output.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: french-typecheck-output
          path: typecheck-output.txt
