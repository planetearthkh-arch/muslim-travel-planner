name: Commit Prayer Snapshot

on:
  push:
    branches:
      - codex/prayer-cache-fix

permissions:
  contents: write

jobs:
  snapshot:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/prayer-cache-fix
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prayer:snapshot
      - name: Commit verified snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/generated/jerusalem-prayer-snapshot.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Commit verified Jerusalem prayer snapshot"
          git push origin HEAD:codex/prayer-cache-fix
