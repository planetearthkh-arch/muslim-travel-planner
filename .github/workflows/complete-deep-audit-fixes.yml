name: Complete deep audit fixes

on:
  push:
    branches:
      - codex/deep-audit-fixes-july-4

permissions:
  contents: write

jobs:
  complete:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply final regression-test and localization corrections
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')

          for path in (root / 'ios/App/App').glob('*.lproj/InfoPlist.strings'):
              text = path.read_text(encoding='utf-8')
              text = '\n'.join(line for line in text.splitlines() if 'NSLocationAlwaysAndWhenInUseUsageDescription' not in line).strip() + '\n'
              path.write_text(text, encoding='utf-8')

          hardening = root / 'src/app-hardening.test.ts'
          text = hardening.read_text(encoding='utf-8')
          text = text.replace("test('iOS location permission text and portrait-only phone orientation are committed'", "test('iOS foreground location permission and portrait-only phone orientation are committed'")
          text = text.replace("assert.equal(plist.includes('<key>NSLocationAlwaysAndWhenInUseUsageDescription</key>'), true);", "assert.equal(plist.includes('<key>NSLocationAlwaysAndWhenInUseUsageDescription</key>'), false);")
          text = text.replace("for (const language of ['en', 'ar', 'id', 'ms', 'tr', 'fr'])", "for (const language of ['en', 'ar', 'id', 'ms', 'tr', 'fr', 'ur'])")
          text = text.replace("assert.equal(localized.includes('NSLocationAlwaysAndWhenInUseUsageDescription'), true);", "assert.equal(localized.includes('NSLocationAlwaysAndWhenInUseUsageDescription'), false);")
          hardening.write_text(text, encoding='utf-8')

          planner = root / 'src/planner.test.ts'
          text = planner.read_text(encoding='utf-8')
          replacements = {
              "privacy.includes(\"['en', 'ar', 'id', 'ms', 'tr']\")": "privacy.includes(\"['en', 'ar', 'id', 'ms', 'tr', 'fr', 'ur']\")",
              "support.includes(\"['en', 'ar', 'id', 'ms', 'tr']\")": "support.includes(\"['en', 'ar', 'id', 'ms', 'tr', 'fr', 'ur']\")",
              "assert.equal(source.includes('await searchPrayerPlaces({ latitude: Number(first.lat), longitude: Number(first.lon), label: first.display_name }, sequence)'), true);": "assert.equal(source.includes('await searchPrayerPlaces(center, sequence)'), true);",
              "assert.equal(info.includes('NSLocationAlwaysAndWhenInUseUsageDescription'), true);": "assert.equal(info.includes('NSLocationAlwaysAndWhenInUseUsageDescription'), false);",
              "const launchContents = await repoFile('ios/App/App/Assets.xcassets/LaunchIcon.imageset/Contents.json');": "const launchContents = await repoFile('ios/App/App/Assets.xcassets/LaunchLogo.imageset/Contents.json');",
              "assert.equal(storyboard.includes('image=\"LaunchIcon\"'), true);": "assert.equal(storyboard.includes('image=\"LaunchLogo\"'), true);",
              "assert.equal(launchContents.includes('launch-icon.png'), true);": "assert.equal(launchContents.includes('LaunchLogo_1x.png'), true);\n  assert.equal(launchContents.includes('LaunchLogo_2x.png'), true);\n  assert.equal(launchContents.includes('LaunchLogo_3x.png'), true);",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected planner test text: {old}')
              text = text.replace(old, new, 1)
          planner.write_text(text, encoding='utf-8')
          PY
      - name: Validate full corrected application
        id: validate
        shell: bash
        run: |
          set +e
          : > /tmp/complete-validation.log
          npm ci >> /tmp/complete-validation.log 2>&1
          ci_status=$?
          npm test >> /tmp/complete-validation.log 2>&1
          test_status=$?
          npm run lint >> /tmp/complete-validation.log 2>&1
          lint_status=$?
          npm run build:native >> /tmp/complete-validation.log 2>&1
          build_status=$?
          printf '\nSTATUSES ci=%s test=%s lint=%s build=%s\n' "$ci_status" "$test_status" "$lint_status" "$build_status" >> /tmp/complete-validation.log
          if [ "$ci_status" -eq 0 ] && [ "$test_status" -eq 0 ] && [ "$lint_status" -eq 0 ] && [ "$build_status" -eq 0 ]; then
            echo 'ok=true' >> "$GITHUB_OUTPUT"
          else
            echo 'ok=false' >> "$GITHUB_OUTPUT"
          fi
          exit 0
      - name: Commit completed corrections
        if: steps.validate.outputs.ok == 'true'
        run: |
          rm -f TEST_FAILURE.log FINALIZE_FAILURE.log COMPLETE_FAILURE.log
          rm -f .github/workflows/complete-deep-audit-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete deep audit fixes'
          git push
      - name: Record remaining validation failure
        if: steps.validate.outputs.ok != 'true'
        run: |
          git reset --hard HEAD
          cp /tmp/complete-validation.log COMPLETE_FAILURE.log
          rm -f .github/workflows/complete-deep-audit-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record remaining deep-audit validation failure'
          git push
          exit 1
