name: Sync Package Lock Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/sync-package-lock-once.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-audit-findings-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts
      - name: Commit lockfile update
        run: |
          rm .github/workflows/sync-package-lock-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json .github/workflows/sync-package-lock-once.yml
          git commit -m 'Sync package lock release version'
          git push origin HEAD:codex/fix-audit-findings-v2
