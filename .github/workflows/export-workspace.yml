name: Export workspace

on:
  push:
    branches: [fix-all-release-blockers]
    paths:
      - export-trigger.txt

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-all-release-blockers
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Package workspace
        run: tar --exclude=.git --exclude=dist --exclude=dist-test --exclude=android/.gradle -czf workspace.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: hardening-workspace
          path: workspace.tgz
          retention-days: 1
