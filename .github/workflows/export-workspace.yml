name: Export workspace

on:
  push:
    branches: [fix-all-release-blockers]
    paths:
      - export-trigger.txt

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-all-release-blockers
          fetch-depth: 0
      - name: Package source workspace
        run: tar --exclude=.git --exclude=node_modules --exclude=dist --exclude=dist-test --exclude=workspace.tgz -czf workspace.tgz .
      - name: Commit temporary archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workspace.tgz
          git commit -m "Export temporary source workspace" || exit 0
          git push origin HEAD:fix-all-release-blockers
