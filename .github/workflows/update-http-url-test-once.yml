name: Update HTTP URL Test Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/update-http-url-test-once.yml'

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-audit-findings-v2
      - name: Update stale HTTP expectation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/planner.test.ts')
          text = path.read_text()
          text = text.replace(
              "test('shared external URL sanitizer accepts only HTTP and HTTPS links'",
              "test('shared external URL sanitizer accepts HTTPS links and rejects unencrypted URLs'",
          )
          replacements = {
              "assert.equal(safeExternalUrl('http://example.com'), 'http://example.com/');": "assert.equal(safeExternalUrl('http://example.com'), '');",
              "assert.equal(safeExternalUrl('http://example.com/'), 'http://example.com/');": "assert.equal(safeExternalUrl('http://example.com/'), '');",
              "assert.equal(safeExternalUrl('http://example.com/path'), 'http://example.com/path');": "assert.equal(safeExternalUrl('http://example.com/path'), '');",
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          if 'http://example.com/\');' in text:
              raise SystemExit('A stale HTTP URL sanitizer expectation remains')
          path.write_text(text)
          PY
      - name: Commit updated test
        shell: bash
        run: |
          rm .github/workflows/update-http-url-test-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/planner.test.ts .github/workflows/update-http-url-test-once.yml
          git commit -m 'Update external URL sanitizer regression test'
          git push origin HEAD:codex/fix-audit-findings-v2
