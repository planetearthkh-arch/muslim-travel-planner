name: Apply Al-Aqsa main-entry fix

on:
  push:
    branches:
      - codex/restore-al-aqsa-main-entry
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/restore-al-aqsa-main-entry
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply fix
        run: python3 scripts/apply-al-aqsa-main-entry-fix.py
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - name: Commit validated fix
        run: |
          rm -f .github/workflows/apply-al-aqsa-main-entry-fix.yml
          rm -f scripts/apply-al-aqsa-main-entry-fix.py
          rm -f al-aqsa-main-entry-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore Al-Aqsa Mosque main entry"
          git push origin HEAD:codex/restore-al-aqsa-main-entry
