name: Apply French Dependent Maps

on:
  push:
    branches: [add-french-language]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-french-language
      - name: Add French entries to dependent language maps
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Expected text not found in {path}: {old[:80]}')
              file.write_text(text.replace(old, new, 1))

          replace_once(
              'src/athan.ts',
              "  tr: { prayer: { Fajr: 'Sabah', Dhuhr: 'Öğle', Asr: 'İkindi', Maghrib: 'Akşam', Isha: 'Yatsı' }, title: 'namazı', testTitle: 'SafarOne namaz bildirimi', testBody: 'Namaz bildirimi sesi' },\n",
              "  tr: { prayer: { Fajr: 'Sabah', Dhuhr: 'Öğle', Asr: 'İkindi', Maghrib: 'Akşam', Isha: 'Yatsı' }, title: 'namazı', testTitle: 'SafarOne namaz bildirimi', testBody: 'Namaz bildirimi sesi' },\n  fr: { prayer: { Fajr: 'Fajr', Dhuhr: 'Dhuhr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Isha' }, title: 'prière', testTitle: 'Notification de prière SafarOne', testBody: 'Son de notification de prière' },\n",
          )

          replace_once(
              'src/money.ts',
              "const localeFor = (language: Language) => ({ en: 'en-US', ar: 'ar', id: 'id-ID', ms: 'ms-MY', tr: 'tr-TR' })[language];",
              "const localeFor = (language: Language) => ({ en: 'en-US', ar: 'ar', id: 'id-ID', ms: 'ms-MY', tr: 'tr-TR', fr: 'fr-FR' })[language];",
          )
          replace_once(
              'src/money.ts',
              "  const tr = known?.tr ?? en;\n  const countries = known?.countries ?? [];",
              "  const tr = known?.tr ?? en;\n  const fr = en;\n  const countries = known?.countries ?? [];",
          )
          replace_once(
              'src/money.ts',
              "    name: { en, ar, id, ms, tr },",
              "    name: { en, ar, id, ms, tr, fr },",
          )
          replace_once(
              'src/money.ts',
              "    search: [upper, en, ar, id, ms, tr, ...countries, ...(known?.aliases ?? [])].map((value) => value.toLowerCase()),",
              "    search: [upper, en, ar, id, ms, tr, fr, ...countries, ...(known?.aliases ?? [])].map((value) => value.toLowerCase()),",
          )

          replace_once(
              'src/planner.ts',
              "  tr: {\n    travelTo: (name: string) => `${name} noktasına seyahat`,\n    travelDetails: (transportation: string) => `${transportation}; canlı trafik değil, rota tahminidir.`,\n    attractionDetails: (groupSize: number, hasChildren: boolean, note: string) => `Önerilen ziyaret planı. ${groupSize} kişilik grup için uygundur${hasChildren ? ', çocuklarla birlikte' : ''}.${note ? ` ${note}` : ''}`,\n    prayerTitle: (prayer: string, name: string) => `${name} yakınında ${prayer} namazı`,\n    prayerDetails: (method: string, women: string, wudu: string, notes: string, fallback: string) => `${method}. Kadın alanı: ${women}. Abdest: ${wudu}.${fallback ? ` ${fallback}` : ''}${notes ? ` ${notes}` : ''}`,\n    mealTitle: (name: string) => `Helal hassasiyetli yemek molası: ${name}`,\n    mealDetails: (support: string, budget: string, preference: string, fallback: string) => `${support} Bütçe: ${budget}. Tercih: ${preference}.${fallback ? ` ${fallback}` : ''}`,\n    freeTimeTitle: 'Yakını keşfet',\n    freeTimeDetails: 'Dinlenmek, yakındaki sokakları gezmek veya başka uygun bir durak seçmek için serbest zaman.',\n    freeTimeAlternativeDetails: 'Dinlenmek veya yakındaki farklı bir durağı seçmek için alternatif serbest zaman.',\n    fallbackAttraction: 'Tam eşleşme bulunamadığı için en güvenli uygun durak seçildi.',\n    fallbackMeal: 'Planlayıcı verilerinde bütçe veya helal tercihi için tam eşleşme bulunamadı.',\n    fallbackPrayer: 'Planlayıcı verilerinde tesisler için tam eşleşme bulunamadı; imkânları yerinde doğrulayın.',\n  },\n};",
              "  tr: {\n    travelTo: (name: string) => `${name} noktasına seyahat`,\n    travelDetails: (transportation: string) => `${transportation}; canlı trafik değil, rota tahminidir.`,\n    attractionDetails: (groupSize: number, hasChildren: boolean, note: string) => `Önerilen ziyaret planı. ${groupSize} kişilik grup için uygundur${hasChildren ? ', çocuklarla birlikte' : ''}.${note ? ` ${note}` : ''}`,\n    prayerTitle: (prayer: string, name: string) => `${name} yakınında ${prayer} namazı`,\n    prayerDetails: (method: string, women: string, wudu: string, notes: string, fallback: string) => `${method}. Kadın alanı: ${women}. Abdest: ${wudu}.${fallback ? ` ${fallback}` : ''}${notes ? ` ${notes}` : ''}`,\n    mealTitle: (name: string) => `Helal hassasiyetli yemek molası: ${name}`,\n    mealDetails: (support: string, budget: string, preference: string, fallback: string) => `${support} Bütçe: ${budget}. Tercih: ${preference}.${fallback ? ` ${fallback}` : ''}`,\n    freeTimeTitle: 'Yakını keşfet',\n    freeTimeDetails: 'Dinlenmek, yakındaki sokakları gezmek veya başka uygun bir durak seçmek için serbest zaman.',\n    freeTimeAlternativeDetails: 'Dinlenmek veya yakındaki farklı bir durağı seçmek için alternatif serbest zaman.',\n    fallbackAttraction: 'Tam eşleşme bulunamadığı için en güvenli uygun durak seçildi.',\n    fallbackMeal: 'Planlayıcı verilerinde bütçe veya helal tercihi için tam eşleşme bulunamadı.',\n    fallbackPrayer: 'Planlayıcı verilerinde tesisler için tam eşleşme bulunamadı; imkânları yerinde doğrulayın.',\n  },\n  fr: {\n    travelTo: (name: string) => `Trajet vers ${name}`,\n    travelDetails: (transportation: string) => `${transportation} ; estimation d’itinéraire, pas de trafic en direct.`,\n    attractionDetails: (groupSize: number, hasChildren: boolean, note: string) => `Visite suggérée. Adaptée à un groupe de ${groupSize}${hasChildren ? ' avec enfants' : ''}.${note ? ` ${note}` : ''}`,\n    prayerTitle: (prayer: string, name: string) => `Prière de ${prayer} près de ${name}`,\n    prayerDetails: (method: string, women: string, wudu: string, notes: string, fallback: string) => `${method}. Espace femmes : ${women}. Ablutions : ${wudu}.${fallback ? ` ${fallback}` : ''}${notes ? ` ${notes}` : ''}`,\n    mealTitle: (name: string) => `Repas tenant compte du halal : ${name}`,\n    mealDetails: (support: string, budget: string, preference: string, fallback: string) => `${support} Budget : ${budget}. Préférence : ${preference}.${fallback ? ` ${fallback}` : ''}`,\n    freeTimeTitle: 'Explorer les environs',\n    freeTimeDetails: 'Temps libre pour se reposer, découvrir les rues voisines ou choisir une autre étape adaptée.',\n    freeTimeAlternativeDetails: 'Temps libre alternatif pour se reposer ou choisir une autre étape à proximité.',\n    fallbackAttraction: 'Aucune correspondance parfaite n’était disponible ; l’étape adaptée la plus sûre a été choisie.',\n    fallbackMeal: 'Aucune correspondance parfaite de budget ou de préférence halal n’était disponible dans les données.',\n    fallbackPrayer: 'Aucune correspondance parfaite pour les équipements n’était disponible ; vérifiez-les sur place.',\n  },\n};",
          )

          replace_once(
              'src/planner.ts',
              "  tr: {\n    'Sample facility details; confirm locally before travel.': 'Tesis bilgileri eksik olabilir; seyahatten önce yerinde doğrulayın.',\n    'Verified in this mock dataset for prototype status-label testing only; reconfirm before travel.': 'Tesis bilgileri eksik olabilir; seyahatten önce yeniden kontrol edin.',\n  },\n};",
              "  tr: {\n    'Sample facility details; confirm locally before travel.': 'Tesis bilgileri eksik olabilir; seyahatten önce yerinde doğrulayın.',\n    'Verified in this mock dataset for prototype status-label testing only; reconfirm before travel.': 'Tesis bilgileri eksik olabilir; seyahatten önce yeniden kontrol edin.',\n  },\n  fr: {\n    'Sample facility details; confirm locally before travel.': 'Les informations sur les équipements peuvent être incomplètes ; confirmez-les sur place avant le voyage.',\n    'Verified in this mock dataset for prototype status-label testing only; reconfirm before travel.': 'Les informations sur les équipements peuvent être incomplètes ; vérifiez-les à nouveau avant le voyage.',\n  },\n};",
          )
          replace_once(
              'src/planner.ts',
              "  tr: 'Helal durumu bağımsız olarak doğrulanmamıştır; sipariş vermeden önce helal sertifikasını, içerikleri ve çapraz temas riskini doğrulayın.',\n})[language];",
              "  tr: 'Helal durumu bağımsız olarak doğrulanmamıştır; sipariş vermeden önce helal sertifikasını, içerikleri ve çapraz temas riskini doğrulayın.',\n  fr: 'Le statut halal n’a pas été confirmé indépendamment ; vérifiez la certification, les ingrédients et les risques de contact croisé avant de commander.',\n})[language];",
          )
          replace_once(
              'src/planner.ts',
              "  tr: 'Tesis bilgileri eksik olabilir',\n})[language];",
              "  tr: 'Tesis bilgileri eksik olabilir',\n  fr: 'Les informations sur les équipements peuvent être incomplètes',\n})[language];",
          )
          replace_once(
              'src/planner.ts',
              "  tr: { Fajr: 'Sabah', Dhuhr: 'Öğle', Asr: 'İkindi', Maghrib: 'Akşam', Isha: 'Yatsı' },\n};",
              "  tr: { Fajr: 'Sabah', Dhuhr: 'Öğle', Asr: 'İkindi', Maghrib: 'Akşam', Isha: 'Yatsı' },\n  fr: { Fajr: 'Fajr', Dhuhr: 'Dhuhr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Isha' },\n};",
          )

          replace_once(
              'src/saved-trips.ts',
              "  const suffix: Record<Language, string> = { en: 'copy', ar: 'نسخة', id: 'salinan', ms: 'salinan', tr: 'kopya' };",
              "  const suffix: Record<Language, string> = { en: 'copy', ar: 'نسخة', id: 'salinan', ms: 'salinan', tr: 'kopya', fr: 'copie' };",
          )
          PY
      - name: Commit French dependent maps
        run: |
          if git diff --quiet; then
            echo "French dependent maps already applied."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/athan.ts src/money.ts src/planner.ts src/saved-trips.ts
          git commit -m "Complete French language maps"
          git push origin HEAD:add-french-language
