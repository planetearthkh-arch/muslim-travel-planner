name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - run: npm run test:browser-smoke

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: npm ci
      - run: npm run android:setup
      - run: ./gradlew lintDebug testDebugUnitTest assembleDebug assembleRelease --stacktrace
        working-directory: android

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify iOS simulator build
        run: npm run ios:verify 2>&1 | tee ios-verify.log
      - name: Upload iOS compiler diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-verify-diagnostics
          path: ios-verify.log
          if-no-files-found: error
          retention-days: 7
      - run: npm run ios:archive-verify
