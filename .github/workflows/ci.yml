name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-stale-halal-test:
    if: github.event_name == 'pull_request' && github.head_ref == 'halal-provider-csp-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: halal-provider-csp-fix
      - name: Update stale assertion
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/planner.test.ts')
          text = path.read_text()
          old = "assert.equal(query.includes('nwr[\"diet:halal\"](around:5000,0,0)'), true);"
          new = "assert.equal(query.includes('nwr[\"amenity\"~\"^(restaurant|fast_food|cafe|food_court)$\"][\"diet:halal\"](around:5000,0,0)'), true);"
          if old not in text:
              raise SystemExit('Expected stale assertion was not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/planner.test.ts
          git commit -m "Update halal query planner test"
          git push origin HEAD:halal-provider-csp-fix

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Run tests
        id: tests
        continue-on-error: true
        run: npm test > test-output.txt 2>&1
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-output
          path: test-output.txt
      - name: Fail on test error
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - run: npm run lint
      - run: npm run test:browser-smoke

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: npm ci
      - run: npm run android:setup
      - run: ./gradlew assembleDebug --stacktrace
        working-directory: android

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ios:verify
