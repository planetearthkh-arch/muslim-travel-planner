name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Run tests and capture output
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee test-failure.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Print concise failure summary
        if: steps.tests.outcome == 'failure'
        run: |
          node scripts/summarize-test-log.mjs
          cat failure-summary.txt
      - name: Fail when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - run: npm run lint
      - run: npm run test:browser-smoke

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: npm ci
      - run: npm run android:setup
      - run: ./gradlew assembleDebug --stacktrace
        working-directory: android

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ios:verify
