name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-deep-audit-issues
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Run tests and capture output
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee test-failure.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Build concise failure summary
        if: steps.tests.outcome == 'failure'
        run: node scripts/summarize-test-log.mjs
      - name: Commit concise failure summary
        if: steps.tests.outcome == 'failure' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add failure-summary.txt
          git commit -m "Summarize current test failures" || true
          git push origin HEAD:codex/fix-deep-audit-issues
      - name: Fail when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - run: npm run lint
      - run: npm run test:browser-smoke

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: npm ci
      - run: npm run android:setup
      - run: ./gradlew assembleDebug --stacktrace
        working-directory: android

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ios:verify
