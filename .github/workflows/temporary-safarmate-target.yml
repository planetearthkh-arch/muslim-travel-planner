name: Temporary SafarMate Target Runner

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: write

jobs:
  rename:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/rename-safarmate'
    runs-on: ubuntu-latest
    steps:
      - name: Check out rename branch
        uses: actions/checkout@v4
        with:
          ref: agent/rename-safarmate
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply complete professional rename
        run: python3 scripts/rename-safarmate.py

      - name: Restore permanent workflow files
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/rename-safarmate.yml
          rm -f scripts/rename-safarmate.py

      - name: Install dependencies
        run: npm ci

      - name: Validate rename
        shell: bash
        run: |
          npm run typecheck
          npm test
          npm run build:native
          npm run lint

      - name: Verify branding and compatibility
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path('.')
          skipped_parts = {'.git', 'node_modules', 'dist', 'dist-native', 'build', 'coverage'}
          failures = []

          def skipped(path: Path) -> bool:
              return any(part in skipped_parts for part in path.parts)

          for path in root.rglob('*'):
              if skipped(path):
                  continue
              if any(old in path.name for old in ('SafarOne', 'safarone', 'SAFARONE')):
                  failures.append(f'Legacy brand remains in path: {path}')
              if not path.is_file():
                  continue
              data = path.read_bytes()
              if b'\x00' in data:
                  continue
              try:
                  text = data.decode('utf-8')
              except UnicodeDecodeError:
                  continue
              searchable = text
              if path == Path('capacitor.config.ts'):
                  searchable = searchable.replace("scheme: 'SafarOne'", '')
              for old in ('SafarOne', 'safarone', 'SAFARONE'):
                  if old in searchable:
                      failures.append(f'Legacy brand remains in {path}: {old}')

          checks = {
              'web title': ('index.html', 'SafarMate — Muslim Travel Planner'),
              'PWA brand': ('public/manifest.webmanifest', '"short_name": "SafarMate"'),
              'iOS display name': ('ios/App/App/Info.plist', '<string>SafarMate</string>'),
              'Android display name': ('mobile/android/res/values/strings.xml', '<string name="app_name">SafarMate</string>'),
              'in-app brand': ('src/i18n.ts', "title: 'SafarMate'"),
              'share export': ('src/trip-share.ts', 'SafarMate — Muslim Travel Planner'),
              'brand standard': ('docs/BRAND_IDENTITY.md', 'App Store name: **SafarMate: Muslim Travel**'),
              'bundle continuity': ('capacitor.config.ts', "appId: 'com.planetearthkids.muslimtravelplanner'"),
              'storage continuity': ('src/saved-trips.ts', "SAVED_TRIPS_STORAGE_KEY = 'mtp-saved-trips-v1'"),
              'legacy WebView continuity': ('capacitor.config.ts', "scheme: 'SafarOne'"),
          }
          for label, (filename, expected) in checks.items():
              text = Path(filename).read_text(encoding='utf-8')
              if expected not in text:
                  failures.append(f'Missing {label}: {expected}')

          if failures:
              raise SystemExit('\n'.join(failures))
          print('SafarMate branding and compatibility checks passed.')
          PY

      - name: Commit completed rename
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No rename changes were produced."
            exit 1
          fi
          git commit -m "Rename app to SafarMate"
          git push origin HEAD:agent/rename-safarmate
