name: Apply deep audit fixes

on:
  push:
    branches:
      - codex/deep-audit-fixes-july-4

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply audited corrections
        run: |
          python -m pip install --disable-pip-version-check pillow
          python scripts/audit_fix_main.py
          python scripts/audit_fix_flight_notifications.py
          python scripts/audit_fix_native_launch.py
          python scripts/audit_fix_legal.py

      - name: Validate corrected application
        id: validate
        shell: bash
        run: |
          set +e
          {
            echo '## npm ci'
            npm ci
            echo '## npm test'
            npm test
            echo '## npm run lint'
            npm run lint
            echo '## npm run build:native'
            npm run build:native
          } 2>&1 | tee /tmp/deep-audit-validation.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit validation failure report
        if: steps.validate.outputs.status != '0'
        shell: bash
        run: |
          git reset --hard HEAD
          cp /tmp/deep-audit-validation.log AUDIT_FIX_FAILURE.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add AUDIT_FIX_FAILURE.log
          git commit -m 'Record deep-audit validation failure'
          git push
          exit 1

      - name: Commit corrected application
        if: steps.validate.outputs.status == '0'
        shell: bash
        run: |
          rm -f AUDIT_FIX_FAILURE.log
          rm -f scripts/audit_fix_common.py
          rm -f scripts/audit_fix_main.py
          rm -f scripts/audit_fix_flight_notifications.py
          rm -f scripts/audit_fix_native_launch.py
          rm -f scripts/audit_fix_legal.py
          rm -f .github/workflows/apply-deep-audit-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix deep audit issues'
          git push
