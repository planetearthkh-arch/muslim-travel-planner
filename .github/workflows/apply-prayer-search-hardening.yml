name: Apply prayer search hardening

on:
  push:
    branches:
      - codex/harden-prayer-space-search
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/harden-prayer-space-search
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply fix
        run: python3 scripts/apply-prayer-search-hardening.py
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - name: Commit validated fix
        run: |
          rm -f .github/workflows/apply-prayer-search-hardening.yml
          rm -f scripts/apply-prayer-search-hardening.py
          rm -f prayer-search-hardening-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden mosque and prayer-space search"
          git push origin HEAD:codex/harden-prayer-space-search
