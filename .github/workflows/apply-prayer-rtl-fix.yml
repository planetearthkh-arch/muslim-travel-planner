name: Apply Prayer and RTL Fix

on:
  push:
    branches:
      - codex/fix-prayer-classification-and-rtl-maps

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-prayer-classification-and-rtl-maps
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Vendor pinned RTL shaping plugin
        shell: bash
        run: |
          archive="$(npm pack @mapbox/mapbox-gl-rtl-text@0.3.0 --silent)"
          rm -rf package
          tar -xzf "$archive"
          cp package/dist/mapbox-gl-rtl-text.js public/mapbox-gl-rtl-text.js
          license_file="$(find package -maxdepth 2 -type f -iname 'LICENSE*' -print -quit)"
          test -n "$license_file"
          cp "$license_file" public/mapbox-gl-rtl-text.LICENSE.txt
          test "$(wc -c < public/mapbox-gl-rtl-text.js)" -gt 5000
          rm -rf package "$archive"
      - name: Apply source and regression fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          branch = Path('.')
          prayer = branch / 'src/prayer-spaces.ts'
          source = prayer.read_text()

          old = "const alAqsaMainNamePattern = /\\bal[-\\s]?aqsa\\b|\\bmasjid\\s+(?:al[-\\s]?)?aqsa\\b|المسجد\\s+الأقصى|المسجد\\s+الاقصى|مسجد\\s+الأقصى|مسجد\\s+الاقصى/iu;"
          new = "const alAqsaMainNamePattern = /^(?:the\\s+)?(?:al[-\\s]?aqsa(?:\\s+(?:mosque|masjid))?|masjid\\s+(?:al[-\\s]?)?aqsa|المسجد\\s+الأقصى|المسجد\\s+الاقصى|مسجد\\s+الأقصى|مسجد\\s+الاقصى|الأقصى|الاقصى)$/iu;\nconst nonPrayerFacilityNamePattern = /\\b(?:clinic|hospital|medical|healthcare|health\\s+(?:centre|center)|pharmacy|doctors?|school|college|university|kindergarten|academy|library|museum|office|bank|hotel|hostel|restaurant|cafe|shop|market)\\b|عيادة|مستشفى|مستوصف|صيدلية|مدرسة|جامعة|كلية|روضة|أكاديمية|اكاديمية|مكتبة|متحف|مكتب|بنك|فندق|مطعم|مقهى|متجر|سوق/iu;"
          if old not in source:
              raise SystemExit('Al-Aqsa pattern anchor not found')
          source = source.replace(old, new)

          old = "function isClearlyNonMuslimNamed(tags: OsmTags) {\n  return prayerPlaceSearchableNames(tags).some((name) => nonMuslimPlacePattern.test(name) && !mosqueWordPattern.test(name));\n}\n\nfunction isMainAlAqsaName(tags: OsmTags) {\n  return prayerPlaceSearchableNames(tags).some((name) => alAqsaMainNamePattern.test(name));\n}"
          new = "function isClearlyNonMuslimNamed(tags: OsmTags) {\n  return prayerPlaceSearchableNames(tags).some((name) => nonMuslimPlacePattern.test(name) && !mosqueWordPattern.test(name));\n}\n\nfunction isClearlyNonPrayerFacilityNamed(tags: OsmTags) {\n  return prayerPlaceSearchableNames(tags).some((name) => nonPrayerFacilityNamePattern.test(name));\n}\n\nfunction isMainAlAqsaName(tags: OsmTags) {\n  return prayerPlaceSearchableNames(tags).some((name) => alAqsaMainNamePattern.test(name.trim()));\n}\n\nfunction isMainAlAqsaParent(tags: OsmTags, latitude: number, longitude: number) {\n  return insideBounds(latitude, longitude, AL_AQSA_COMPOUND_BOUNDS) && isMainAlAqsaName(tags) && !isClearlyNonPrayerFacilityNamed(tags);\n}"
          if old not in source:
              raise SystemExit('Prayer name helper anchor not found')
          source = source.replace(old, new)

          old = "  if (isMainAlAqsaName(tags)) return 'mosque';\n  if (amenity === 'place_of_worship' && hasMuslimSignal(tags)) return 'mosque';\n  if (amenity === 'community_centre' && hasMuslimSignal(tags)) return 'islamic-centre';\n  if (amenity === 'prayer_room' || room === 'prayer' || tags.prayer_room === 'yes') return 'prayer-room';"
          new = "  const hasExplicitPrayerTag = (amenity === 'place_of_worship' && hasMuslimSignal(tags))\n    || (amenity === 'community_centre' && hasMuslimSignal(tags))\n    || amenity === 'prayer_room'\n    || room === 'prayer'\n    || tags.prayer_room === 'yes';\n  if (!hasExplicitPrayerTag && isClearlyNonPrayerFacilityNamed(tags)) return undefined;\n  if (amenity === 'place_of_worship' && hasMuslimSignal(tags)) return 'mosque';\n  if (amenity === 'community_centre' && hasMuslimSignal(tags)) return 'islamic-centre';\n  if (amenity === 'prayer_room' || room === 'prayer' || tags.prayer_room === 'yes') return 'prayer-room';"
          if old not in source:
              raise SystemExit('Classification anchor not found')
          source = source.replace(old, new)

          old = "  const latitude = element.lat ?? element.center?.lat;\n  const longitude = element.lon ?? element.center?.lon;\n  const type = classifyPrayerPlace(tags);\n  if (!type || typeof latitude !== 'number' || typeof longitude !== 'number') return undefined;\n  if (isAlAqsaCompoundSubstructure(tags, latitude, longitude)) return undefined;"
          new = "  const latitude = element.lat ?? element.center?.lat;\n  const longitude = element.lon ?? element.center?.lon;\n  if (typeof latitude !== 'number' || typeof longitude !== 'number') return undefined;\n  const type = classifyPrayerPlace(tags) ?? (isMainAlAqsaParent(tags, latitude, longitude) ? 'mosque' : undefined);\n  if (!type) return undefined;\n  if (isAlAqsaCompoundSubstructure(tags, latitude, longitude)) return undefined;"
          if old not in source:
              raise SystemExit('Normalization anchor not found')
          source = source.replace(old, new)

          old = "    const namePattern = 'Al[- ]?Aqsa|Masjid[ -]?(?:al[- ]?)?Aqsa|الأقصى|الاقصى';"
          new = "    const namePattern = '^Al[- ]?Aqsa$|^Al[- ]?Aqsa Mosque$|^Al[- ]?Aqsa Masjid$|^Masjid[ -]?Al[- ]?Aqsa$|^Masjid[ -]?Aqsa$|^المسجد الأقصى$|^المسجد الاقصى$|^مسجد الأقصى$|^مسجد الاقصى$|^الأقصى$|^الاقصى$';"
          if old not in source:
              raise SystemExit('Overpass name pattern anchor not found')
          source = source.replace(old, new)
          prayer.write_text(source)

          (branch / 'src/map-rtl-bootstrap.ts').write_text("""import maplibregl from 'maplibre-gl';

const globalState = globalThis as typeof globalThis & { __safarOneRtlMapPluginInstalled?: boolean };
const rtlPluginUrl = new URL('./mapbox-gl-rtl-text.js', document.baseURI).toString();

if (!globalState.__safarOneRtlMapPluginInstalled) {
  globalState.__safarOneRtlMapPluginInstalled = true;
  if (maplibregl.getRTLTextPluginStatus() === 'unavailable') {
    maplibregl.setRTLTextPlugin(rtlPluginUrl, true);
  }
}
""")

          index = branch / 'index.html'
          html = index.read_text()
          anchor = '    <script type="module" src="/src/prayer-search-bootstrap.ts"></script>\n'
          replacement = '    <script type="module" src="/src/map-rtl-bootstrap.ts"></script>\n' + anchor
          if anchor not in html:
              raise SystemExit('Index bootstrap anchor not found')
          index.write_text(html.replace(anchor, replacement, 1))

          sw = branch / 'public/sw.js'
          worker = sw.read_text().replace("mtp-app-shell-v15", "mtp-app-shell-v16")
          anchor = "  new URL('./manifest.webmanifest', APP_SCOPE).toString(),\n"
          replacement = anchor + "  new URL('./mapbox-gl-rtl-text.js', APP_SCOPE).toString(),\n"
          if anchor not in worker:
              raise SystemExit('Service worker app shell anchor not found')
          sw.write_text(worker.replace(anchor, replacement, 1))

          for test_path in ['src/app-hardening.test.ts', 'src/release-hardening.test.ts']:
              path = branch / test_path
              text = path.read_text().replace('mtp-app-shell-v15', 'mtp-app-shell-v16')
              path.write_text(text)

          jerusalem_test = branch / 'src/prayer-spaces-jerusalem.test.ts'
          test_source = jerusalem_test.read_text()
          test_source = test_source.replace("  assert.equal(classifyPrayerPlace(parent.tags ?? {}), 'mosque');", "  assert.equal(classifyPrayerPlace(parent.tags ?? {}), undefined);")
          insert_after = "  assert.equal(normalizePrayerPlace(parent, origin)?.name, 'Al-Aqsa Mosque');\n});\n"
          addition = """

test('Al-Aqsa clinics, hospitals, and schools are never converted into mosques', () => {
  const examples = [
    { amenity: 'clinic', name: 'Al-Aqsa Clinic' },
    { amenity: 'hospital', name: 'Al-Aqsa Hospital' },
    { amenity: 'school', name: 'Al-Aqsa School' },
  ];
  for (const [index, tags] of examples.entries()) {
    const element: OverpassElement = {
      type: 'node',
      id: 100 + index,
      lat: 31.7780,
      lon: 35.2354,
      tags: { ...tags, 'name:en': tags.name },
    };
    assert.equal(classifyPrayerPlace(element.tags ?? {}), undefined);
    assert.equal(normalizePrayerPlace(element, origin), undefined);
  }
});

test('an exact Al-Aqsa name without prayer tags is accepted only inside the compound', () => {
  const elsewhere: OverpassElement = {
    type: 'node',
    id: 110,
    lat: 31.90,
    lon: 35.30,
    tags: { name: 'Al-Aqsa Mosque', 'name:en': 'Al-Aqsa Mosque' },
  };
  assert.equal(normalizePrayerPlace(elsewhere, origin), undefined);
});
"""
          if insert_after not in test_source:
              raise SystemExit('Jerusalem test insertion anchor not found')
          jerusalem_test.write_text(test_source.replace(insert_after, insert_after + addition, 1))

          (branch / 'src/map-rtl-bootstrap.test.ts').write_text("""import assert from 'node:assert/strict';
import test from 'node:test';

async function repoFile(path: string) {
  const load = new Function('specifier', 'return import(specifier)') as (specifier: string) => Promise<{ readFile: (path: URL, encoding: string) => Promise<string>; stat: (path: URL) => Promise<{ size: number }> }>;
  return load('node:fs/promises').then(async (fs) => ({
    content: await fs.readFile(new URL('../' + path, import.meta.url), 'utf8'),
    size: (await fs.stat(new URL('../' + path, import.meta.url))).size,
  }));
}

test('RTL map shaping is bundled locally and installed before the app creates maps', async () => {
  const html = (await repoFile('index.html')).content;
  const bootstrap = (await repoFile('src/map-rtl-bootstrap.ts')).content;
  const plugin = await repoFile('public/mapbox-gl-rtl-text.js');
  const license = await repoFile('public/mapbox-gl-rtl-text.LICENSE.txt');
  const worker = (await repoFile('public/sw.js')).content;

  assert.equal(html.indexOf('/src/map-rtl-bootstrap.ts') < html.indexOf('/src/main.ts'), true);
  assert.match(bootstrap, /getRTLTextPluginStatus\(\) === 'unavailable'/);
  assert.match(bootstrap, /setRTLTextPlugin\(rtlPluginUrl, true\)/);
  assert.match(bootstrap, /\.\/mapbox-gl-rtl-text\.js/);
  assert.equal(bootstrap.includes('https://'), false);
  assert.equal(plugin.size > 5000, true);
  assert.equal(license.size > 100, true);
  assert.match(worker, /mtp-app-shell-v16/);
  assert.match(worker, /mapbox-gl-rtl-text\.js/);
});
""")
          PY
      - name: Verify source changes
        run: |
          grep -q "map-rtl-bootstrap.ts" index.html
          grep -q "mapbox-gl-rtl-text.js" public/sw.js
          grep -q "Al-Aqsa clinics, hospitals, and schools" src/prayer-spaces-jerusalem.test.ts
          grep -q "isMainAlAqsaParent" src/prayer-spaces.ts
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html public/sw.js public/mapbox-gl-rtl-text.js public/mapbox-gl-rtl-text.LICENSE.txt src/prayer-spaces.ts src/prayer-spaces-jerusalem.test.ts src/map-rtl-bootstrap.ts src/map-rtl-bootstrap.test.ts src/app-hardening.test.ts src/release-hardening.test.ts
          git commit -m "Fix prayer-place classification and RTL map labels"
          git push origin HEAD:codex/fix-prayer-classification-and-rtl-maps
