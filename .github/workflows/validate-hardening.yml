name: Validate hardening branch

on:
  push:
    branches: [fix-all-release-blockers]
    paths:
      - validation-trigger.txt

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-all-release-blockers
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Run validation and capture diagnostics
        id: validation
        shell: bash
        run: |
          set +e
          {
            echo "== npm ci =="
            npm ci || exit $?
            echo "== typecheck =="
            npm run typecheck || exit $?
            echo "== tests =="
            npm test || exit $?
            echo "== lint =="
            npm run lint || exit $?
            echo "== build =="
            npm run build || exit $?
          } 2>&1 | tee validation-run.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation-run.log
          git commit -m "Record hardening validation diagnostics" || exit 0
          git push origin HEAD:fix-all-release-blockers
      - name: Fail when validation failed
        if: steps.validation.outputs.status != '0'
        run: exit 1
