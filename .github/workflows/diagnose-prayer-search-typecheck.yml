name: Diagnose prayer search typecheck

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture typecheck output
        run: npm run typecheck > prayer-typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: prayer-typecheck-log
          path: prayer-typecheck.log
