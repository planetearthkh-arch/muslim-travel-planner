name: Apply release hardening

on:
  push:
    branches: [fix-all-release-blockers]
    paths:
      - scripts/apply-release-hardening-phase2.mjs
      - hardening-trigger-phase2.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-all-release-blockers
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply and validate hardening patch
        id: hardening
        shell: bash
        run: |
          set +e
          {
            echo "== apply phase 2 patch =="
            node scripts/apply-release-hardening-phase2.mjs
            patch_status=$?
            if [ "$patch_status" -ne 0 ]; then
              echo "PATCH_STATUS=$patch_status"
              exit "$patch_status"
            fi

            echo "== npm install =="
            npm install
            install_status=$?
            if [ "$install_status" -ne 0 ]; then
              echo "INSTALL_STATUS=$install_status"
              exit "$install_status"
            fi

            echo "== typecheck =="
            npm run typecheck || exit $?
            echo "== tests =="
            npm test || exit $?
            echo "== lint =="
            npm run lint || exit $?
            echo "== build =="
            npm run build || exit $?
          } 2>&1 | tee hardening-run.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit result or diagnostic log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.hardening.outputs.status }}" = "0" ]; then
            rm -f hardening-run.log hardening-trigger.txt hardening-trigger-phase2.txt
            message="Complete release hardening and validation"
          else
            message="Record release hardening phase 2 diagnostics"
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "$message"
          git push origin HEAD:fix-all-release-blockers
      - name: Fail workflow when validation failed
        if: steps.hardening.outputs.status != '0'
        run: exit 1
