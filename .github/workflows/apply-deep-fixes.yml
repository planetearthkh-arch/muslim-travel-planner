name: Apply deep audit fixes

on:
  push:
    branches: [codex/fix-deep-audit-issues]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-deep-audit-issues
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/apply-deep-fixes.mjs
      - run: npm ci
      - name: Typecheck generated fixes
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee deep-fix-typecheck.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Commit generated snapshot
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply deep audit fix snapshot" || true
          git push origin HEAD:codex/fix-deep-audit-issues
      - name: Fail when typecheck failed
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
