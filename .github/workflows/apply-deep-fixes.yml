name: Apply deep audit fixes

on:
  push:
    branches: [codex/fix-deep-audit-issues]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-deep-audit-issues
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/apply-deep-fixes.mjs
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run lint
      - run: npm run ios:version-verify
      - name: Commit generated fixes
        run: |
          rm scripts/apply-deep-fixes.mjs .github/workflows/apply-deep-fixes.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix deep audit issues"
          git push origin HEAD:codex/fix-deep-audit-issues
