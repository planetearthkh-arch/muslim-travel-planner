name: Inspect Map Labels Once

on:
  push:
    branches:
      - codex/clean-map-label-restoration
    paths:
      - .github/workflows/inspect-map-labels-once.yml

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/clean-map-label-restoration
          fetch-depth: 0
      - name: Record map label and map creation sites
        shell: bash
        run: |
          {
            echo '=== label definitions and calls ==='
            grep -nE 'englishMapNameExpression|applyEnglishMapLabels|setLayoutProperty|text-field' src/main.ts src/map-rtl-bootstrap.ts || true
            echo '=== map constructors ==='
            grep -nE 'new maplibre\.Map|\.on\(.load.|\.on\(.style\.load.' src/main.ts src/map-rtl-bootstrap.ts || true
            echo '=== startup entries ==='
            grep -nE 'map-rtl-bootstrap|app-bootstrap|main\.ts|ensureRtlMapSupport' index.html src/app-bootstrap.ts src/map-rtl-bootstrap.ts || true
          } > map-label-inventory.txt
      - name: Commit report and remove workflow
        run: |
          rm .github/workflows/inspect-map-labels-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add map-label-inventory.txt .github/workflows/inspect-map-labels-once.yml
          git commit -m "Record map label inventory"
          git push origin HEAD:codex/clean-map-label-restoration
