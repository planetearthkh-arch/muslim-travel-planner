name: Set iOS Build 118 Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/set-ios-build-118-once.yml
      - ios/App/App.xcodeproj/project.pbxproj

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/ios-build-118
          fetch-depth: 0
      - name: Set build 118 exactly
        shell: bash
        run: |
          count_before="$(grep -c 'CURRENT_PROJECT_VERSION = 117;' ios/App/App.xcodeproj/project.pbxproj)"
          test "$count_before" -eq 2
          sed -i 's/CURRENT_PROJECT_VERSION = 117;/CURRENT_PROJECT_VERSION = 118;/g' ios/App/App.xcodeproj/project.pbxproj
          test "$(grep -c 'CURRENT_PROJECT_VERSION = 118;' ios/App/App.xcodeproj/project.pbxproj)" -eq 2
          test "$(grep -c 'CURRENT_PROJECT_VERSION = 117;' ios/App/App.xcodeproj/project.pbxproj || true)" -eq 0
          test "$(grep -c 'DEVELOPMENT_TEAM =' ios/App/App.xcodeproj/project.pbxproj || true)" -eq 0
      - name: Commit build number and remove workflow
        shell: bash
        run: |
          rm .github/workflows/set-ios-build-118-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios/App/App.xcodeproj/project.pbxproj .github/workflows/set-ios-build-118-once.yml
          git commit -m "Prepare iOS build 118"
          git push origin HEAD:codex/ios-build-118
