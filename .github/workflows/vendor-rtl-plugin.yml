name: Vendor RTL Plugin

on:
  push:
    branches:
      - codex/final-local-rtl-startup-fix

permissions:
  contents: write

jobs:
  vendor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/final-local-rtl-startup-fix
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install pinned RTL package without changing package metadata
        run: npm install --no-save --ignore-scripts @mapbox/mapbox-gl-rtl-text@0.3.0
      - name: Copy plugin and license into the app
        shell: bash
        run: |
          test -f node_modules/@mapbox/mapbox-gl-rtl-text/dist/mapbox-gl-rtl-text.js
          cp node_modules/@mapbox/mapbox-gl-rtl-text/dist/mapbox-gl-rtl-text.js public/mapbox-gl-rtl-text.js
          license_file="$(find node_modules/@mapbox/mapbox-gl-rtl-text -maxdepth 2 -type f -iname 'LICENSE*' -print -quit)"
          test -n "$license_file"
          cp "$license_file" public/mapbox-gl-rtl-text.LICENSE.txt
          test "$(wc -c < public/mapbox-gl-rtl-text.js)" -gt 50000
      - name: Commit the pinned local plugin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/mapbox-gl-rtl-text.js public/mapbox-gl-rtl-text.LICENSE.txt
          git commit -m "Vendor local RTL text plugin"
          git push origin HEAD:codex/final-local-rtl-startup-fix
