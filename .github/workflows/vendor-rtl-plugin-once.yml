name: Vendor RTL Plugin Once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/vendor-rtl-plugin-once.yml

permissions:
  contents: write

jobs:
  vendor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download pinned RTL plugin package
        run: |
          npm pack @mapbox/mapbox-gl-rtl-text@0.3.0 --silent
          mkdir -p .tmp-rtl public/vendor
          tar -xzf mapbox-mapbox-gl-rtl-text-0.3.0.tgz -C .tmp-rtl
          cp .tmp-rtl/package/dist/mapbox-gl-rtl-text.js public/vendor/mapbox-gl-rtl-text.js
          cp .tmp-rtl/package/LICENSE.md public/vendor/mapbox-gl-rtl-text.LICENSE.md

      - name: Commit bundled plugin
        run: |
          rm -rf .tmp-rtl mapbox-mapbox-gl-rtl-text-0.3.0.tgz
          rm .github/workflows/vendor-rtl-plugin-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/vendor .github/workflows/vendor-rtl-plugin-once.yml
          git commit -m "Bundle RTL text plugin locally"
          git push origin HEAD:main
