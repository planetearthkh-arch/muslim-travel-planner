name: Apply French Language Test

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'add-french-language'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-french-language
      - name: Update language cycle test
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/planner.test.ts')
          text = path.read_text()
          replacements = [
            ('supports switching among English, Arabic, Bahasa Indonesia, Bahasa Melayu, and Turkish', 'supports switching among English, Arabic, Bahasa Indonesia, Bahasa Melayu, Turkish, and French'),
            ("['en', 'ar', 'id', 'ms', 'tr']", "['en', 'ar', 'id', 'ms', 'tr', 'fr']"),
            ("  assert.equal(languages.find((language) => language.code === 'tr')?.label, 'Türkçe');\n", "  assert.equal(languages.find((language) => language.code === 'tr')?.label, 'Türkçe');\n  assert.equal(languages.find((language) => language.code === 'fr')?.label, 'Français');\n"),
            ("  assert.equal(nextLanguage('tr'), 'en');\n", "  assert.equal(nextLanguage('tr'), 'fr');\n  assert.equal(nextLanguage('fr'), 'en');\n"),
            ("  assert.equal(languageDirection('tr'), 'ltr');\n", "  assert.equal(languageDirection('tr'), 'ltr');\n  assert.equal(languageDirection('fr'), 'ltr');\n"),
          ]
          for old, new in replacements:
              if new not in text:
                  text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Commit test update
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/planner.test.ts
          git commit -m "Update language cycle test for French"
          git push origin HEAD:add-french-language
