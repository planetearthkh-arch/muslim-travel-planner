name: Audit French Coverage

on:
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'add-french-language'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: rm -rf dist-test && npx tsc -p tsconfig.json --outDir dist-test
      - name: Export untranslated English labels
        run: |
          node --input-type=module <<'JS'
          import { labels } from './dist-test/i18n.js';
          import { frenchLabels } from './dist-test/french-labels.js';
          const missing = Object.fromEntries(
            Object.entries(labels.en).filter(([key]) => !(key in frenchLabels))
          );
          await import('node:fs/promises').then((fs) => fs.writeFile('missing-french-labels.json', JSON.stringify(missing, null, 2)));
          console.log(`Missing French labels: ${Object.keys(missing).length}`);
          JS
      - uses: actions/upload-artifact@v4
        with:
          name: missing-french-labels
          path: missing-french-labels.json
