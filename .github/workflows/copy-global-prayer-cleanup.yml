name: Copy global prayer cleanup

on:
  push:
    branches:
      - codex/global-prayer-place-cleanup-final
  workflow_dispatch:

permissions:
  contents: write

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/global-prayer-place-cleanup-final
          fetch-depth: 0

      - name: Copy validated prayer cleanup files
        run: |
          git fetch origin codex/global-prayer-place-cleanup
          git checkout origin/codex/global-prayer-place-cleanup -- src/prayer-spaces.ts src/prayer-spaces-global.test.ts
          rm -f .github/workflows/copy-global-prayer-cleanup.yml
          rm -f global-prayer-cleanup-final-trigger.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build

      - name: Commit clean result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean prayer-place results worldwide"
          git push origin HEAD:codex/global-prayer-place-cleanup-final
