name: Final release polish

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  polish:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'codex/fix-release-audit-all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/apply-final-release-polish.mjs
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build:native
      - name: Commit polished source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git restore --staged .github/workflows/final-release-polish.yml scripts/apply-final-release-polish.mjs
          git commit -m "Complete release audit polish"
          git push origin HEAD:${{ github.head_ref }}
