name: Run permanent app bug fixes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-permanent-app-bugs
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply permanent fixes
        run: python3 scripts/apply-permanent-bug-fixes.py

      - name: Install dependencies
        run: npm ci

      - name: Validate fixes
        run: |
          npm run typecheck
          npm test
          npm run lint
          npm run build
          npm run ios:version-verify

      - name: Commit validated fixes
        run: |
          rm -f .github/workflows/apply-permanent-bug-fixes.yml
          rm -f .github/bugfix-trigger.txt
          rm -f scripts/apply-permanent-bug-fixes.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix remaining app reliability bugs"
          git push origin HEAD:codex/fix-permanent-app-bugs
