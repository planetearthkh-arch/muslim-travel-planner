name: Capture failing test output

on:
  push:
    branches: [codex/fix-deep-audit-issues]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-deep-audit-issues
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests and capture output
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee test-failure.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Commit captured output
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add test-failure.log
          git commit -m "Capture test failure output" || true
          git push origin HEAD:codex/fix-deep-audit-issues
      - name: Fail when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
