name: Capture test failure

on:
  push:
    branches:
      - codex/deep-audit-fixes-july-4

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture test output
        shell: bash
        run: |
          set +e
          npm test > /tmp/test-failure.log 2>&1
          status=$?
          echo "TEST_EXIT_STATUS=$status" >> /tmp/test-failure.log
          cp /tmp/test-failure.log TEST_FAILURE.log
          rm -f .github/workflows/capture-test-failure.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add TEST_FAILURE.log .github/workflows/capture-test-failure.yml
          git commit -m 'Capture failing test output'
          git push
