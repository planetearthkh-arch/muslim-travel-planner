name: Read Merge Test Once

on:
  push:
    branches:
      - codex/verify-bundled-arabic-map
    paths:
      - .github/workflows/read-merge-test-once.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: b2736941a4b650cdc0d5480f9573a326d6940824
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture exact merge tests
        run: npm test > merge-test-output.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: merge-test-output
          path: merge-test-output.txt
