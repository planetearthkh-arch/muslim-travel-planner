name: Read Merge Test Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/read-merge-test-once.yml
      - src/**/*.ts
      - public/**
      - index.html

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Print only failing assertions
        shell: bash
        run: |
          set +e
          npm test > merge-test-output.txt 2>&1
          status=$?
          grep -nE 'not ok|failureType|error:|location:|Expected values|actual:|expected:|stack:' merge-test-output.txt || true
          tail -n 35 merge-test-output.txt
          exit $status
