name: Finalize release hardening

on:
  push:
    branches: [fix-all-release-blockers]
    paths:
      - scripts/final-hardening-ready.txt

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-all-release-blockers
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/apply-final-release-fixes.mjs
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm run build:native
      - name: Commit final hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete release hardening and remove temporary tooling"
          git push origin HEAD:fix-all-release-blockers
