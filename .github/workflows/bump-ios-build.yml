name: Bump iOS Build

on:
  push:
    branches:
      - codex/ios-build-109

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/ios-build-109
      - name: Set build 109
        run: sed -i 's/CURRENT_PROJECT_VERSION = 103;/CURRENT_PROJECT_VERSION = 109;/g' ios/App/App.xcodeproj/project.pbxproj
      - name: Verify build number
        run: |
          test "$(grep -c 'CURRENT_PROJECT_VERSION = 109;' ios/App/App.xcodeproj/project.pbxproj)" -eq 2
          test "$(grep -c 'CURRENT_PROJECT_VERSION = 103;' ios/App/App.xcodeproj/project.pbxproj)" -eq 0
      - name: Commit build number
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios/App/App.xcodeproj/project.pbxproj
          git commit -m "Set iOS build number to 109"
          git push origin HEAD:codex/ios-build-109
