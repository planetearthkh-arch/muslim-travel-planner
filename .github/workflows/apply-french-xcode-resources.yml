name: Apply French Xcode Resources

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'add-french-language'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-french-language
      - name: Register French InfoPlist strings
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('ios/App/App.xcodeproj/project.pbxproj')
          text = path.read_text()
          replacements = [
            ("\t\tB00100062D2D000000000001 /* tr InfoPlist.strings in Resources */ = {isa = PBXBuildFile; fileRef = B00100142D2D000000000001 /* tr InfoPlist.strings */; };\n", "\t\tB00100062D2D000000000001 /* tr InfoPlist.strings in Resources */ = {isa = PBXBuildFile; fileRef = B00100142D2D000000000001 /* tr InfoPlist.strings */; };\n\t\tB00100072D2D000000000001 /* fr InfoPlist.strings in Resources */ = {isa = PBXBuildFile; fileRef = B00100152D2D000000000001 /* fr InfoPlist.strings */; };\n"),
            ("\t\tB00100142D2D000000000001 /* tr InfoPlist.strings */ = {isa = PBXFileReference; lastKnownFileType = text.plist.strings; name = \"tr InfoPlist.strings\"; path = tr.lproj/InfoPlist.strings; sourceTree = \"<group>\"; };\n", "\t\tB00100142D2D000000000001 /* tr InfoPlist.strings */ = {isa = PBXFileReference; lastKnownFileType = text.plist.strings; name = \"tr InfoPlist.strings\"; path = tr.lproj/InfoPlist.strings; sourceTree = \"<group>\"; };\n\t\tB00100152D2D000000000001 /* fr InfoPlist.strings */ = {isa = PBXFileReference; lastKnownFileType = text.plist.strings; name = \"fr InfoPlist.strings\"; path = fr.lproj/InfoPlist.strings; sourceTree = \"<group>\"; };\n"),
            ("\t\t\t\tB00100142D2D000000000001 /* tr InfoPlist.strings */,\n", "\t\t\t\tB00100142D2D000000000001 /* tr InfoPlist.strings */,\n\t\t\t\tB00100152D2D000000000001 /* fr InfoPlist.strings */,\n"),
            ("\t\t\t\tms,\n\t\t\t\tBase,\n", "\t\t\t\tms,\n\t\t\t\ttr,\n\t\t\t\tfr,\n\t\t\t\tBase,\n"),
            ("\t\t\t\tB00100062D2D000000000001 /* tr InfoPlist.strings in Resources */,\n", "\t\t\t\tB00100062D2D000000000001 /* tr InfoPlist.strings in Resources */,\n\t\t\t\tB00100072D2D000000000001 /* fr InfoPlist.strings in Resources */,\n"),
          ]
          for old, new in replacements:
              if new not in text:
                  text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Commit Xcode update
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ios/App/App.xcodeproj/project.pbxproj
          git commit -m "Register French iOS permission localization"
          git push origin HEAD:add-french-language
