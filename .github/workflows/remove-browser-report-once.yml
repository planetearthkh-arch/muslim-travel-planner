name: Remove Browser Report Once

on:
  push:
    branches:
      - codex/verify-bundled-arabic-map
    paths:
      - .github/workflows/remove-browser-report-once.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/verify-bundled-arabic-map
          fetch-depth: 0
      - name: Remove diagnostic files
        run: |
          rm -f browser-smoke-output.txt
          rm .github/workflows/remove-browser-report-once.yml
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary browser diagnostics"
          git push origin HEAD:codex/verify-bundled-arabic-map
