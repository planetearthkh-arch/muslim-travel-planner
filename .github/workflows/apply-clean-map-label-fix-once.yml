name: Apply Clean Map Label Fix Once

on:
  push:
    branches:
      - codex/clean-map-label-restoration
    paths:
      - .github/workflows/apply-clean-map-label-fix-once.yml

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/clean-map-label-restoration
          fetch-depth: 0
      - name: Remove destructive label rewriting
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/main.ts')
          source = path.read_text()

          source = source.replace(
              "import maplibregl from 'maplibre-gl';\nimport 'maplibre-gl/dist/maplibre-gl.css';",
              "import maplibregl from 'maplibre-gl';\nimport 'maplibre-gl/dist/maplibre-gl.css';\nimport { ensureRtlMapSupport } from './map-rtl-bootstrap.js';",
              1,
          )

          for line in [
              "  getStyle: () => { layers?: MapLibreStyleLayer[] };\n",
              "  getLayoutProperty: (layerId: string, property: string) => unknown;\n",
              "  setLayoutProperty: (layerId: string, property: string, value: unknown) => void;\n",
          ]:
              if line not in source:
                  raise SystemExit(f'Missing expected map type line: {line!r}')
              source = source.replace(line, '', 1)

          expression = """const englishMapNameExpression = [
  'coalesce',
  ['get', 'name:en'],
  ['get', 'name_en'],
  ['get', 'name:latin'],
  ['get', 'name'],
  ['get', 'ref'],
];

"""
          if expression not in source:
              raise SystemExit('English map expression block was not found.')
          source = source.replace(expression, '', 1)

          function = """function applyEnglishMapLabels(map: MapLibreMap) {
  const layers = map.getStyle().layers ?? [];
  for (const layer of layers) {
    if (layer.type !== 'symbol') continue;
    try {
      const textField = map.getLayoutProperty(layer.id, 'text-field');
      if (typeof textField === 'undefined' || !JSON.stringify(textField).includes('name')) continue;
      map.setLayoutProperty(layer.id, 'text-field', englishMapNameExpression);
    } catch {
      // Some symbol layers contain icons or special text expressions and should remain unchanged.
    }
  }
}

"""
          if function not in source:
              raise SystemExit('Destructive map label function was not found.')
          source = source.replace(function, '', 1)

          source = source.replace(
              'function initializeMap(copy: typeof labels[Language]) {',
              'async function initializeMap(copy: typeof labels[Language]) {',
              1,
          )

          marker = """  if (!Number.isFinite(lat) || !Number.isFinite(lng) || !maplibre) {
    showMapFallback(element, status, copy.mapUnavailable);
    return;
  }
  try {
"""
          replacement = """  if (!Number.isFinite(lat) || !Number.isFinite(lng) || !maplibre) {
    showMapFallback(element, status, copy.mapUnavailable);
    return;
  }
  await ensureRtlMapSupport(lang);
  try {
"""
          if marker not in source:
              raise SystemExit('Map initialization guard was not found.')
          source = source.replace(marker, replacement, 1)

          if '      applyEnglishMapLabels(cityMap);\n' not in source:
              raise SystemExit('Map label rewrite call was not found.')
          source = source.replace('      applyEnglishMapLabels(cityMap);\n', '', 1)

          if '  initializeMap(copy);\n' not in source:
              raise SystemExit('Map initialization call was not found.')
          source = source.replace('  initializeMap(copy);\n', '  void initializeMap(copy);\n', 1)

          for forbidden in ['englishMapNameExpression', 'applyEnglishMapLabels', "setLayoutProperty(layer.id, 'text-field'"]:
              if forbidden in source:
                  raise SystemExit(f'Destructive label code still remains: {forbidden}')

          path.write_text(source)
          PY
      - name: Commit clean map label fix
        run: |
          rm -f map-label-inventory.txt
          rm .github/workflows/apply-clean-map-label-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preserve original English and Arabic map labels"
          git push origin HEAD:codex/clean-map-label-restoration
