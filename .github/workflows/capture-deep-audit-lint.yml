name: Capture Deep Audit Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/deep-professional-audit.mjs'
      - '.github/workflows/capture-deep-audit-lint.yml'

permissions:
  contents: read

jobs:
  lint-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture lint output
        shell: bash
        run: npm run lint > deep-audit-lint.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: deep-audit-lint-diagnostic
          path: deep-audit-lint.txt
          retention-days: 2
