name: Apply French Language

on:
  push:
    branches: [add-french-language]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-french-language
      - name: Connect French translations
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/i18n.ts')
          text = path.read_text()

          if "import { frenchLabels } from './french-labels.js';" not in text:
              text = text.replace(
                  "import type { PrayerName, Region, VerificationStatus } from './models.js';\n",
                  "import type { PrayerName, Region, VerificationStatus } from './models.js';\nimport { frenchLabels } from './french-labels.js';\n",
                  1,
              )

          text = text.replace(
              "export type Language = 'en' | 'ar' | 'id' | 'ms' | 'tr';",
              "export type Language = 'en' | 'ar' | 'id' | 'ms' | 'tr' | 'fr';",
              1,
          )

          if "{ code: 'fr', label: 'Français' }" not in text:
              text = text.replace(
                  "  { code: 'tr', label: 'Türkçe' },\n",
                  "  { code: 'tr', label: 'Türkçe' },\n  { code: 'fr', label: 'Français' },\n",
                  1,
              )

          text = text.replace('export const labels = {', 'const baseLabels = {', 1)
          old_end = '} satisfies Record<Language, Record<string, string>>;\n\nexport const regionLabels'
          new_end = "} satisfies Record<Exclude<Language, 'fr'>, Record<string, string>>;\n\nexport const labels: Record<Language, Record<string, string>> = {\n  ...baseLabels,\n  fr: { ...baseLabels.en, ...frenchLabels },\n};\n\nexport const regionLabels"
          if old_end in text:
              text = text.replace(old_end, new_end, 1)

          replacements = {
              "  tr: { Europe: 'Avrupa', 'Middle East': 'Orta Doğu', Asia: 'Asya', 'North America': 'Kuzey Amerika', Africa: 'Afrika', Oceania: 'Okyanusya' },\n": "  tr: { Europe: 'Avrupa', 'Middle East': 'Orta Doğu', Asia: 'Asya', 'North America': 'Kuzey Amerika', Africa: 'Afrika', Oceania: 'Okyanusya' },\n  fr: { Europe: 'Europe', 'Middle East': 'Moyen-Orient', Asia: 'Asie', 'North America': 'Amérique du Nord', Africa: 'Afrique', Oceania: 'Océanie' },\n",
              "  tr: { Sample: 'Örnek', Unverified: 'Doğrulanmamış', Verified: 'Doğrulanmış' },\n": "  tr: { Sample: 'Örnek', Unverified: 'Doğrulanmamış', Verified: 'Doğrulanmış' },\n  fr: { Sample: 'Exemple', Unverified: 'Non vérifié', Verified: 'Vérifié' },\n",
              "  tr: { Fajr: 'Sabah', Dhuhr: 'Öğle', Asr: 'İkindi', Maghrib: 'Akşam', Isha: 'Yatsı' },\n": "  tr: { Fajr: 'Sabah', Dhuhr: 'Öğle', Asr: 'İkindi', Maghrib: 'Akşam', Isha: 'Yatsı' },\n  fr: { Fajr: 'Fajr', Dhuhr: 'Dhuhr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Isha' },\n",
              "    tr: { low: 'ekonomik', mid: 'orta', high: 'yüksek' },\n": "    tr: { low: 'ekonomik', mid: 'orta', high: 'yüksek' },\n    fr: { low: 'économique', mid: 'moyen', high: 'élevé' },\n",
              "    tr: { low: 'düşük', medium: 'orta', high: 'yüksek' },\n": "    tr: { low: 'düşük', medium: 'orta', high: 'yüksek' },\n    fr: { low: 'faible', medium: 'moyenne', high: 'élevée' },\n",
              "    tr: { walking: 'yürüyüş', 'public transport': 'toplu taşıma', taxi: 'taksi' },\n": "    tr: { walking: 'yürüyüş', 'public transport': 'toplu taşıma', taxi: 'taksi' },\n    fr: { walking: 'à pied', 'public transport': 'transports en commun', taxi: 'taxi' },\n",
              "    tr: { mosque: 'cami', 'quiet prayer space': 'sakin mescit', flexible: 'esnek' },\n": "    tr: { mosque: 'cami', 'quiet prayer space': 'sakin mescit', flexible: 'esnek' },\n    fr: { mosque: 'mosquée', 'quiet prayer space': 'espace de prière calme', flexible: 'flexible' },\n",
              "    tr: { 'strictly labelled': 'açıkça etiketli', 'vegetarian/seafood options': 'vejetaryen/deniz ürünü seçenekleri', flexible: 'esnek' },\n": "    tr: { 'strictly labelled': 'açıkça etiketli', 'vegetarian/seafood options': 'vejetaryen/deniz ürünü seçenekleri', flexible: 'esnek' },\n    fr: { 'strictly labelled': 'clairement indiqué', 'vegetarian/seafood options': 'options végétariennes ou fruits de mer', flexible: 'flexible' },\n",
          }
          for old, new in replacements.items():
              if old in text and new not in text:
                  text = text.replace(old, new, 1)

          path.write_text(text)

          fr_dir = Path('ios/App/App/fr.lproj')
          fr_dir.mkdir(parents=True, exist_ok=True)
          (fr_dir / 'InfoPlist.strings').write_text(
              '"NSLocationWhenInUseUsageDescription" = "SafarOne utilise votre position uniquement lorsque vous demandez la direction de la Qibla ou des lieux de voyage à proximité.";\n'
              '"NSLocationAlwaysAndWhenInUseUsageDescription" = "SafarOne utilise votre position uniquement lorsque vous demandez la direction de la Qibla ou des lieux de voyage à proximité.";\n'
          )
          PY
      - name: Commit generated wiring
        run: |
          if git diff --quiet; then
            echo "French wiring already applied."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/i18n.ts ios/App/App/fr.lproj/InfoPlist.strings
          git commit -m "Connect French language support"
          git push origin HEAD:add-french-language
