name: Apply release audit fixes

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'codex/fix-release-audit-all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Patch generator matching
        run: node scripts/patch-release-audit-generator.mjs
      - name: Run release-audit generator
        id: generator
        continue-on-error: true
        run: node scripts/apply-release-audit-fixes.mjs > audit-generator.log 2>&1
      - name: Commit generator diagnostics
        if: steps.generator.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit-generator.log
          git commit -m "Record release audit generator failure" --allow-empty
          git push origin HEAD:${{ github.head_ref }}
      - name: Stop after generator failure
        if: steps.generator.outcome == 'failure'
        run: exit 1
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build:native
      - name: Commit generated fixes
        run: |
          rm scripts/apply-release-audit-fixes.mjs
          rm scripts/patch-release-audit-generator.mjs
          rm .github/workflows/apply-release-audit-fixes.yml
          rm -f audit-generator.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix all release audit findings"
          git push origin HEAD:${{ github.head_ref }}
