name: Apply release audit fixes

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'codex/fix-release-audit-all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Prepare generator target
        run: node scripts/prepare-release-audit-target.mjs
      - name: Run release-audit generator
        id: generator
        continue-on-error: true
        run: node scripts/apply-release-audit-fixes.mjs > audit-generator.log 2>&1
      - name: Commit generator diagnostics
        if: steps.generator.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit-generator.log
          git commit -m "Record release audit generator failure" --allow-empty
          git push origin HEAD:${{ github.head_ref }}
      - name: Stop after generator failure
        if: steps.generator.outcome == 'failure'
        run: exit 1
      - run: npm ci
      - name: Run tests
        id: tests
        continue-on-error: true
        run: npm test > audit-tests.log 2>&1
      - name: Commit test diagnostics
        if: steps.tests.outcome == 'failure'
        run: |
          grep -E '^not ok|^# tests |^# pass |^# fail ' audit-tests.log > audit-test-summary.log || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit-tests.log audit-test-summary.log
          git commit -m "Record release audit test failure" --allow-empty
          git push origin HEAD:${{ github.head_ref }}
      - name: Stop after test failure
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Run lint
        id: lint
        continue-on-error: true
        run: npm run lint > audit-lint.log 2>&1
      - name: Commit lint diagnostics
        if: steps.lint.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit-lint.log
          git commit -m "Record release audit lint failure" --allow-empty
          git push origin HEAD:${{ github.head_ref }}
      - name: Stop after lint failure
        if: steps.lint.outcome == 'failure'
        run: exit 1
      - name: Run native build
        id: build
        continue-on-error: true
        run: npm run build:native > audit-build.log 2>&1
      - name: Commit build diagnostics
        if: steps.build.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit-build.log
          git commit -m "Record release audit build failure" --allow-empty
          git push origin HEAD:${{ github.head_ref }}
      - name: Stop after build failure
        if: steps.build.outcome == 'failure'
        run: exit 1
      - name: Commit generated source fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git restore --staged .github/workflows/apply-release-audit-fixes.yml scripts/apply-release-audit-fixes.mjs scripts/patch-release-audit-generator.mjs scripts/prepare-release-audit-target.mjs || true
          for file in audit-generator.log audit-tests.log audit-test-summary.log audit-lint.log audit-build.log; do
            git restore --staged "$file" 2>/dev/null || true
          done
          git commit -m "Fix all release audit findings"
          git push origin HEAD:${{ github.head_ref }}
