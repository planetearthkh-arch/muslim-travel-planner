name: Diagnose global prayer tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture test output
        run: npm test > global-prayer-test.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: global-prayer-test-log
          path: global-prayer-test.log
