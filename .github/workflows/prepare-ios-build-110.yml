name: Prepare iOS Build 110

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/prepare-ios-build-110.yml

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set iOS build number to 110
        run: |
          sed -E -i '' 's/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = 110;/g' ios/App/App.xcodeproj/project.pbxproj
          test "$(grep -c 'CURRENT_PROJECT_VERSION = 110;' ios/App/App.xcodeproj/project.pbxproj)" -eq 2

      - name: Run tests
        run: npm test

      - name: Sync web assets into iOS
        run: npm run ios:sync

      - name: Verify release archive
        run: npm run ios:archive-verify

      - name: Commit release-ready iOS project
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          rm .github/workflows/prepare-ios-build-110.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prepare iOS build 110 with RTL map fix"
          git push origin HEAD:"$HEAD_BRANCH"
