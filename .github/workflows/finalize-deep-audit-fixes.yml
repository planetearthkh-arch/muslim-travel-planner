name: Finalize deep audit fixes

on:
  push:
    branches:
      - codex/deep-audit-fixes-july-4

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Align native permissions and regression tests
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')

          for path in (root / 'ios/App/App').glob('*.lproj/InfoPlist.strings'):
              text = path.read_text(encoding='utf-8')
              text = '\n'.join(line for line in text.splitlines() if 'NSLocationAlwaysAndWhenInUseUsageDescription' not in line).strip() + '\n'
              path.write_text(text, encoding='utf-8')

          hardening = root / 'src/app-hardening.test.ts'
          text = hardening.read_text(encoding='utf-8')
          text = text.replace("test('iOS location permission text and portrait-only phone orientation are committed'", "test('iOS foreground location permission and portrait-only phone orientation are committed'")
          text = text.replace("assert.equal(plist.includes('<key>NSLocationAlwaysAndWhenInUseUsageDescription</key>'), true);", "assert.equal(plist.includes('<key>NSLocationAlwaysAndWhenInUseUsageDescription</key>'), false);")
          text = text.replace("for (const language of ['en', 'ar', 'id', 'ms', 'tr', 'fr'])", "for (const language of ['en', 'ar', 'id', 'ms', 'tr', 'fr', 'ur'])")
          text = text.replace("assert.equal(localized.includes('NSLocationAlwaysAndWhenInUseUsageDescription'), true);", "assert.equal(localized.includes('NSLocationAlwaysAndWhenInUseUsageDescription'), false);")
          hardening.write_text(text, encoding='utf-8')

          planner = root / 'src/planner.test.ts'
          text = planner.read_text(encoding='utf-8')
          text = text.replace("privacy.includes(\"['en', 'ar', 'id', 'ms', 'tr']\")", "privacy.includes(\"['en', 'ar', 'id', 'ms', 'tr', 'fr', 'ur']\")")
          text = text.replace("support.includes(\"['en', 'ar', 'id', 'ms', 'tr']\")", "support.includes(\"['en', 'ar', 'id', 'ms', 'tr', 'fr', 'ur']\")")
          planner.write_text(text, encoding='utf-8')
          PY
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build:native
      - name: Commit final corrections
        run: |
          rm -f TEST_FAILURE.log
          rm -f .github/workflows/finalize-deep-audit-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize deep audit fixes'
          git push
